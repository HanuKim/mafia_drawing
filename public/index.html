<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>마피아 드로잉 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
        }

        canvas {
            touch-action: none;
            background: white;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            cursor: crosshair;
        }

        .hidden {
            display: none !important;
        }

        .player-card {
            transition: all 0.2s;
        }
    </style>
</head>

<body class="min-h-screen text-slate-800 flex items-center justify-center p-4">

    <!-- 1. 닉네임 입력 화면 -->
    <div id="screen-login" class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
        <h1 class="text-3xl font-bold mb-6 text-indigo-600">👨‍🎨 마피아 드로잉</h1>
        <input type="text" id="nickname-input" placeholder="닉네임을 입력하세요"
            class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 focus:border-indigo-500 focus:outline-none mb-4 text-center text-lg">
        <button id="btn-login"
            class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-colors">접속하기</button>
    </div>

    <!-- 2. 로비 화면 -->
    <div id="screen-lobby" class="hidden bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold">방 목록</h2>
            <button id="btn-create-room"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium">방 만들기</button>
        </div>
        <div id="room-list" class="space-y-3">
            <!-- 룸 리스트 -->
        </div>
    </div>

    <!-- 3. 대기방 화면 -->
    <div id="screen-waiting" class="hidden bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <h2 class="text-2xl font-bold">대기방 <span id="waiting-room-id" class="text-indigo-600"></span></h2>
                <button id="btn-leave-room"
                    class="text-sm bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded text-slate-700">나가기</button>
            </div>
            <button id="btn-start-game"
                class="hidden bg-emerald-500 hover:bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold">게임
                시작</button>
        </div>
        <p class="text-sm text-slate-500 mb-4">* 최소 3명 이상부터 시작 가능. (호스트만 시작 버튼 보임)</p>
        <div class="grid grid-cols-2 sm:grid-cols-5 gap-4" id="waiting-players">
            <!-- 플레이어 리스트 -->
        </div>
    </div>

    <!-- 4. 게임 화면 -->
    <div id="screen-game"
        class="hidden w-full max-w-7xl h-[85vh] flex flex-col md:flex-row gap-4 bg-white p-6 rounded-2xl shadow-xl">

        <!-- 좌측 패널 (정보 및 플레이어) -->
        <div class="w-full md:w-64 flex flex-col gap-4">
            <!-- 상태 -->
            <div class="bg-indigo-50 rounded-xl p-4 text-center">
                <div id="game-round" class="text-sm font-bold text-indigo-500 mb-1">라우드 1 / 3</div>
                <div id="game-status" class="text-lg font-black text-slate-800">게임 준비 중</div>
                <div id="game-timer" class="text-2xl font-bold text-red-500 mt-2">--</div>
            </div>

            <!-- 역할 정보 -->
            <div class="bg-slate-50 rounded-xl p-4 text-center border-2 border-slate-100">
                <div class="text-xs text-slate-400 mb-1">내 역할</div>
                <div id="my-role" class="font-bold text-lg mb-2">시민</div>
                <div class="text-xs text-slate-400 mb-1">제시어</div>
                <div id="my-keyword" class="font-black text-2xl text-indigo-600">?</div>
            </div>

            <!-- 현재 라운드 점수 -->
            <div class="flex-1 bg-slate-50 rounded-xl p-4 overflow-y-auto min-h-[150px]">
                <h3 class="text-sm font-bold mb-3 text-slate-500">현재 게임 점수</h3>
                <div id="game-players" class="space-y-2">
                    <!-- 플레이어 요소들 -->
                </div>
            </div>
        </div>

        <!-- 중앙 패널 (캔버스) -->
        <div class="flex-1 flex flex-col relative w-full h-full">
            <!-- 도구 및 투표 제어 영역 -->
            <div id="voting-controls"
                class="hidden flex items-center mb-3 gap-3 overflow-x-auto bg-slate-100 p-2 rounded-lg">
                <span class="text-sm font-bold text-slate-500 whitespace-nowrap">그림 분석:</span>
                <div id="voting-player-buttons" class="flex gap-2"></div>
            </div>
            <div id="drawing-tools" class="flex justify-between items-center mb-3">
                <div class="flex gap-2">
                    <input type="color" id="color-picker" class="w-8 h-8 rounded cursor-pointer" value="#000000">
                    <input type="range" id="size-picker" min="1" max="50" value="5" class="w-24" title="펜/지우개 굵기">
                </div>
                <div class="flex items-center gap-2">
                    <button id="btn-eraser"
                        class="text-sm bg-slate-200 hover:bg-slate-300 px-3 py-1 rounded text-slate-700">지우개</button>
                    <div id="eraser-sizes" style="display: none;"
                        class="items-center gap-2 border-l pl-2 border-slate-300">
                        <button id="eraser-sm" class="w-3 h-3 bg-slate-300 hover:bg-slate-400 rounded-full"
                            title="작은 지우개"></button>
                        <button id="eraser-md" class="w-5 h-5 bg-indigo-400 rounded-full border-2 border-indigo-600"
                            title="중간 지우개"></button>
                        <button id="eraser-lg" class="w-8 h-8 bg-slate-300 hover:bg-slate-400 rounded-full"
                            title="큰 지우개"></button>
                    </div>
                </div>
            </div>

            <!-- 캔버스 영역 -->
            <div class="flex-1 relative bg-slate-100 rounded-xl flex justify-center items-center overflow-hidden border-2 border-slate-200"
                id="canvas-container">
                <canvas id="game-canvas"></canvas>
                <div id="canvas-overlay"
                    class="absolute top-4 right-4 bg-slate-900/70 text-white px-4 py-2 rounded-full font-bold text-sm z-10 hidden shadow-md pointer-events-none">
                    누군가 그리는 중...
                </div>
            </div>
        </div>

        <!-- 우측 패널 (명예의 전당) -->
        <div class="w-full md:w-64 flex flex-col gap-4">
            <div class="flex-1 bg-indigo-50 rounded-xl p-4 overflow-y-auto border border-indigo-100">
                <h3 class="text-sm font-bold mb-3 text-indigo-500">명예의 전당<br>(누적 우승 횟수)</h3>
                <div id="global-players" class="space-y-2">
                    <!-- 글로벌 플레이어 요소들 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 오버레이 모달 (마피아 정답 맞추기 / 투표 등) -->
    <div id="modal-container" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 hidden">
        <div id="modal-content"
            class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-2xl scale-95 transition-transform duration-200">
            <h3 id="modal-title" class="text-2xl font-bold mb-4">알림</h3>
            <p id="modal-desc" class="mb-6 text-lg text-slate-600">내용</p>
            <div id="modal-input-area" class="hidden mb-4">
                <input type="text" id="modal-input"
                    class="w-full px-4 py-2 border rounded-xl text-center focus:outline-none focus:border-indigo-500 text-lg">
            </div>
            <div id="modal-category-area" class="hidden mb-4 grid grid-cols-2 gap-2">
            </div>
            <button id="modal-btn"
                class="hidden bg-indigo-600 hover:bg-indigo-700 text-white w-full py-3 rounded-xl font-bold">확인</button>
            <button id="modal-close-btn"
                class="hidden mt-3 w-full py-2 text-slate-500 underline text-sm hover:text-slate-700">닫기</button>
        </div>
    </div>

    <!-- 5. 채팅 패널 -->
    <div id="chat-container"
        class="fixed bottom-0 right-4 w-80 bg-white rounded-t-2xl shadow-[0_-4px_10px_rgba(0,0,0,0.1)] flex flex-col z-40 transition-transform duration-300 hidden"
        style="height: 400px; transform: translateY(calc(100% - 48px));">
        <div id="chat-header"
            class="h-12 bg-indigo-600 hover:bg-indigo-700 transition-colors text-white px-4 flex justify-between items-center cursor-pointer rounded-t-2xl select-none">
            <div class="font-bold flex items-center gap-2">
                <span>💬 채팅</span>
                <span id="chat-badge"
                    class="bg-red-500 text-white text-[10px] font-black px-2 py-0.5 rounded-full hidden animate-bounce">N</span>
            </div>
            <span id="chat-icon" class="transition-transform duration-300 transform rotate-180">▼</span>
        </div>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col gap-2 bg-slate-50 text-sm">
        </div>
        <div class="p-3 border-t bg-white flex gap-2">
            <input type="text" id="chat-input"
                class="flex-1 px-3 py-2 border rounded-lg focus:outline-none focus:border-indigo-500 text-sm"
                placeholder="메시지 입력">
            <button id="btn-chat-send"
                class="bg-indigo-600 hover:bg-indigo-700 text-white px-3 py-2 rounded-lg font-bold text-sm transition-colors">전송</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="client.js"></script>
</body>

</html>
